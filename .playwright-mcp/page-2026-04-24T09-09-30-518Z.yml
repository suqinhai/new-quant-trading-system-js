                                  - generic [ref=e1841]: "#!/bin/bash set -euxo pipefail exec > >(tee -a /var/log/quant-startup.log) 2>&1 export DEBIAN_FRONTEND=noninteractive apt-get update apt-get install -y ca-certificates curl git redis-server openssl systemctl enable --now redis-server if ! command -v node >/dev/null 2>&1; then curl -fsSL https://deb.nodesource.com/setup_20.x | bash - apt-get install -y nodejs fi id quant >/dev/null 2>&1 || useradd -m -d /opt/quant -s /bin/bash quant mkdir -p /opt/quant if [ ! -d /opt/quant/app/.git ]; then rm -rf /opt/quant/app git clone --depth=1 https://github.com/suqinhai/new-quant-trading-system-js.git /opt/quant/app fi cd /opt/quant/app if [ ! -f .env ]; then J=\"$(openssl rand -hex 32)\" P=\"$(openssl rand -base64 24 | tr -d '\\n' | tr '/+' '_-')\" cat > .env <<ENV NODE_ENV=production RUN_MODE=shadow LOG_LEVEL=info ENABLE_API=true HTTP_PORT=3000 WS_PORT=3001 METRICS_PORT=9090 JWT_SECRET=$J DASHBOARD_USERNAME=staging-admin DASHBOARD_PASSWORD=$P ALLOW_INSECURE_DEFAULT_AUTH=false TRADING_INITIAL_CAPITAL=10000 TRADING_TYPE=swap DEFAULT_SYMBOLS=BTC/USDT DEFAULT_TIMEFRAME=1h TELEGRAM_ENABLED=false MAX_LOSS_PER_TRADE=0.01 MAX_DAILY_LOSS=0.02 MAX_POSITIONS=2 MAX_POSITION_SIZE=0.05 MAX_LEVERAGE=1 ENV fi grep -Ev '^(REDIS_|USE_SHARED_MARKET_DATA=|MARKET_DATA_|SUBSCRIBE_ALL=|BINANCE_API_KEY=|BINANCE_API_SECRET=|BINANCE_SECRET=|BINANCE_TESTNET=|DEFAULT_EXCHANGE=)' .env > .env.new cat >> .env.new <<'ENV' USE_SHARED_MARKET_DATA=true DEFAULT_EXCHANGE=binance MARKET_DATA_EXCHANGES=binance MARKET_DATA_SYMBOLS=BTC/USDT SUBSCRIBE_ALL=false BINANCE_API_KEY=shadow-public-only BINANCE_API_SECRET=shadow-public-only BINANCE_TESTNET=false ENV mv .env.new .env chmod 600 .env if [ ! -f /root/quant-credentials.txt ]; then { echo project=stoked-virtue-493510-f5 echo instance=quant-shadow-test-1 echo mode=shadow echo api_port=3000 echo dashboard_username=staging-admin grep '^DASHBOARD_PASSWORD=' .env | sed 's/^/dashboard_/' grep '^JWT_SECRET=' .env | sed 's/^/jwt_/' echo repo=https://github.com/suqinhai/new-quant-trading-system-js.git } > /root/quant-credentials.txt chmod 600 /root/quant-credentials.txt fi npm install --omit=dev --no-audit --no-fund chown -R quant:quant /opt/quant/app cat > /etc/systemd/system/quant-marketdata.service <<'SERVICE' [Unit] Description=Quant Shared Market Data Service After=network-online.target redis-server.service Wants=network-online.target Requires=redis-server.service [Service] Type=simple WorkingDirectory=/opt/quant/app EnvironmentFile=/opt/quant/app/.env ExecStart=/usr/bin/node /opt/quant/app/src/services/market-data-service.js --exchanges binance --symbols BTC/USDT --trading-type swap Restart=always RestartSec=10 User=quant Group=quant StandardOutput=journal StandardError=journal [Install] WantedBy=multi-user.target SERVICE cat > /etc/systemd/system/quant-shadow.service <<'SERVICE' [Unit] Description=Quant Trading System Shadow Test After=network-online.target redis-server.service quant-marketdata.service Wants=network-online.target quant-marketdata.service Requires=redis-server.service [Service] Type=simple WorkingDirectory=/opt/quant/app EnvironmentFile=/opt/quant/app/.env ExecStart=/usr/bin/node /opt/quant/app/src/main.js shadow --strategy SMA --symbols BTC/USDT --exchange binance Restart=always RestartSec=10 User=quant Group=quant StandardOutput=journal StandardError=journal [Install] WantedBy=multi-user.target SERVICE systemctl daemon-reload systemctl enable --now quant-marketdata.service quant-shadow.service systemctl restart quant-marketdata.service quant-shadow.service"
